<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            display: flex;
            gap: 40px;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        canvas {
            border: 3px solid #fff;
            background: #000;
            display: block;
            image-rendering: pixelated;
        }

        .controls {
            color: white;
            font-size: 14px;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 5px;
        }

        .controls h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .controls p {
            margin: 5px 0;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 30px;
            color: white;
            min-width: 150px;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        .info-box h3 {
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .info-box .value {
            font-size: 32px;
            font-weight: bold;
            color: #4ade80;
        }

        .next-piece {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        .next-piece h3 {
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .next-piece canvas {
            margin: 0 auto;
            display: block;
            background: #000;
            border: 2px solid #666;
        }

        button {
            background: #4ade80;
            color: #000;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        button:hover {
            background: #22c55e;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .game-over {
            text-align: center;
            color: white;
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            z-index: 1000;
            border: 3px solid #ef4444;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ef4444;
        }

        .game-over p {
            font-size: 24px;
            margin: 10px 0;
        }

        .game-over button {
            margin-top: 20px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="left-panel">
            <canvas id="gameCanvas" width="240" height="480"></canvas>
            <div class="controls">
                <h3>Controls</h3>
                
                <p>← → : Move</p>
                <p>↑ : Rotate</p>
                <p>↓ : Drop</p>
                <p>Space : Pause</p>
            </div>
        </div>

        <div class="right-panel">
            <div class="info-box">
                <h3>Score</h3>
                <div class="value" id="score">0</div>
            </div>

            <div class="info-box">
                <h3>Level</h3>
                <div class="value" id="level">1</div>
            </div>

            <div class="info-box">
                <h3>Lines</h3>
                <div class="value" id="lines">0</div>
            </div>

            <div class="next-piece">
                
                <h3>Next</h3>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>

            <button id="pauseBtn">Pause</button>
            <button id="restartBtn">Restart</button>
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h2>GAME OVER</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Level: <span id="finalLevel">0</span></p>
        <p>Lines: <span id="finalLines">0</span></p>
        <button id="restartGameBtn">Play Again</button>
    </div>

    <script src="tetris.js"></script>
</body>
</html>
