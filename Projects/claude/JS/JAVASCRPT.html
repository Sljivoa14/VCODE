<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #a78bfa;
    --green: #22c55e;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
    --code-bg: #0d0d1a;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR */
  #sidebar {
    width: 230px;
    min-width: 230px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 16px 14px 12px;
    border-bottom: 1px solid var(--border);
  }

  #sidebar-header h1 {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
  }

  #sidebar-header p {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  #curriculum {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }

  .section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 14px 4px;
  }

  .topic-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 7px 14px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: #94a3b8;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }

  .topic-btn:hover { color: var(--text); background: rgba(124,58,237,0.08); }
  .topic-btn.active { color: var(--accent2); border-left-color: var(--accent); background: rgba(124,58,237,0.12); }
  .topic-btn.done { color: var(--green); }
  .topic-btn.done::after { content: ' ✓'; font-size: 10px; }

  /* MAIN */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #topbar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
  }

  #current-topic {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent2);
    flex: 1;
  }

  #start-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #start-btn:hover { opacity: 0.85; }
  #start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* CHAT */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.assistant .msg-avatar { background: var(--accent); color: white; }
  .msg.user .msg-avatar { background: #1e293b; color: var(--text); }
  .msg.user { flex-direction: row-reverse; }
  .msg.user .msg-content { background: #1e1b4b; border-color: #312e81; }

  .msg-content {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    max-width: 85%;
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--text);
  }

  .msg-content code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--code-bg);
    border: 1px solid #1e1e3a;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
    color: #a78bfa;
  }

  .msg-content pre {
    background: var(--code-bg);
    border: 1px solid #1e1e3a;
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    color: #c4b5fd;
  }

  .msg-content pre code {
    background: none;
    border: none;
    padding: 0;
    color: inherit;
  }

  .msg-content strong { color: var(--accent2); font-weight: 700; }

  /* INPUT */
  #input-area {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    background: var(--panel);
  }

  #user-input {
    flex: 1;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: opacity 0.2s;
    align-self: flex-end;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .typing-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  #curriculum::-webkit-scrollbar { width: 3px; }
  #curriculum::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>JS Mastery</h1>
    <p>// full curriculum</p>
  </div>
  <div id="curriculum"></div>
</div>

<div id="main">
  <div id="topbar">
    <span id="current-topic">Select a topic to begin</span>
    <button id="start-btn" onclick="startTopic()" disabled>Start Lesson ▶</button>
  </div>
  <div id="chat"></div>
  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Ask a question, say 'more examples', 'quiz me', or 'next'..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
const CURRICULUM = [
  { section: "📗 Basics — Part 1 (4h)", topics: [
    "Variables (let/const)", "Operators", "Data Types", "Functions",
    "Numbers & Number Methods", "Strings & String Methods"
  ]},
  { section: "📘 Basics — Part 2 (5h)", topics: [
    "Conditionals", "Loops", "Arrays & Array Methods",
    "Scope", "Switch Statements", "Math Object"
  ]},
  { section: "📙 Intermediate (5h)", topics: [
    "Classes & Objects", "Arrow Functions", "DOM Manipulation"
  ]},
  { section: "🛠️ Project Day (5h)", topics: [
    "Build: Calculator App", "Build: Notes App", "Build: Todo List App"
  ]},
  { section: "🔴 Advanced (6h)", topics: [
    "DOM — Advanced", "Async/Await", "Promises", "Callbacks"
  ]},
  { section: "🧠 DSA (6h)", topics: [
    "Stacks", "Queues", "Trees", "Binary Search", "DFS", "BFS"
  ]}
];

let activeTopic = null;
let messages = [];
let isLoading = false;
let donedTopics = new Set();

function buildSidebar() {
  const el = document.getElementById('curriculum');
  CURRICULUM.forEach(sec => {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = sec.section;
    el.appendChild(lbl);
    sec.topics.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'topic-btn';
      btn.textContent = t;
      btn.id = 'topic-' + t.replace(/[^a-zA-Z0-9]/g, '_');
      btn.onclick = () => selectTopic(t);
      el.appendChild(btn);
    });
  });
}

function selectTopic(name) {
  activeTopic = name;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('topic-' + name.replace(/[^a-zA-Z0-9]/g, '_'));
  if (btn) btn.classList.add('active');
  document.getElementById('current-topic').textContent = '▸ ' + name;
  document.getElementById('start-btn').disabled = false;
}

function startTopic() {
  if (!activeTopic || isLoading) return;
  messages = [];
  document.getElementById('chat').innerHTML = '';
  document.getElementById('start-btn').disabled = true;
  messages.push({ role: 'user', content: 'Teach me: ' + activeTopic });
  callClaude();
}

function buildSystem() {
  return `You are an elite JavaScript tutor teaching "${activeTopic}".

STYLE:
- Open with a 1-sentence hook: what it is and why it matters
- Use numbered steps or bullet points
- Include 1–2 real, runnable code examples in \`\`\`js blocks
- End with a small challenge: "Try this: ..."
- Use **bold** for key terms
- Be direct, no fluff. Max ~300 words unless asked for more
- For Build projects: guide step-by-step with actual working code

Current topic: ${activeTopic}`;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  if (!activeTopic) {
    appendMsg('assistant', '⚡ Pick a topic from the sidebar first, then click **Start Lesson**!');
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  appendMsg('user', text);
  messages.push({ role: 'user', content: text });
  callClaude();
}

async function callClaude() {
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('start-btn').disabled = true;

  const typingId = showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: buildSystem(),
        messages: messages
      })
    });

    const data = await res.json();
    removeTyping(typingId);

    if (data.error) {
      appendMsg('assistant', '⚠️ API error: ' + data.error.message);
    } else {
      const reply = data.content?.map(b => b.text || '').join('') || 'No response.';
      messages.push({ role: 'assistant', content: reply });
      appendMsg('assistant', reply);
      if (activeTopic) {
        donedTopics.add(activeTopic);
        const btn = document.getElementById('topic-' + activeTopic.replace(/[^a-zA-Z0-9]/g, '_'));
        if (btn) btn.classList.add('done');
      }
    }
  } catch(e) {
    removeTyping(typingId);
    appendMsg('assistant', '⚠️ Connection error: ' + e.message + '. Make sure you\'re running this inside claude.ai.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('start-btn').disabled = false;
}

function formatText(text) {
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${escapeHtml(code.trim())}</code></pre>`
  );
  text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'assistant' ? 'JS' : 'U'}</div>
    <div class="msg-content">${formatText(text)}</div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const id = 'typing-' + Date.now();
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = id;
  div.innerHTML = `<div class="msg-avatar">JS</div><div class="msg-content"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

buildSidebar();

appendMsg('assistant', `**Welcome to JS Mastery!** 🚀

Your full curriculum is loaded on the left — everything from basics to Data Structures & Algorithms.

**How it works:**
1. Click a topic in the sidebar
2. Hit **Start Lesson** — I'll teach it with examples + a challenge
3. Ask anything: *"more examples"*, *"quiz me"*, *"explain differently"*, *"next step"*

If you're brand new, start with **Variables (let/const)**. Let's go!`);
</script>
</body>
</html>
